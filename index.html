<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="./favicon.ico">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mundial FIFA 2026 - Pronósticos</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flag-icons@7.2.3/css/flag-icons.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>🏆 MUNDIAL FIFA 2026 🏆</h1>
    <p class="subtitle">DIECISEISAVOS DE FINAL</p>
  </header>

  <nav class="tab-nav">
    <button class="tab-btn active" data-tab="bracket">⚽ BRACKET</button>
    <button class="tab-btn" data-tab="leaderboard">🏅 RANKING</button>
  </nav>

  <!-- ==================== BRACKET TAB ==================== -->
  <div id="tab-bracket" class="tab-content active">
    <div class="container">

      <!-- Toolbar -->
      <div class="toolbar-btns">
        <button class="toolbar-btn" id="btnReset">🗑️ Limpiar Pronósticos</button>
        <button class="toolbar-btn" id="btnScoringHelp">❓ Puntuación</button>
      </div>

      <!-- BRACKET VISUAL -->
      <div class="bracket-wrapper">
        <div class="bracket-content">
          
          <!-- COLUMNA IZQUIERDA: GRUPOS -->
          <div class="bracket-left">
            <div id="groupsLeft" class="groups-column"></div>
          </div>

          <!-- COLUMNA CENTRAL: BRACKET Y TROFEO -->
          <div class="bracket-center">
            <!-- Bracket Visual -->
            <div class="bracket-visual" id="bracketVisual"></div>
            
            <!-- Trofeo -->
            <div class="trophy-section">
              <div class="trophy">🏆</div>
              <p class="trophy-text">CAMPEÓN</p>
            </div>
          </div>

          <!-- COLUMNA DERECHA: GRUPOS -->
          <div class="bracket-right">
            <div id="groupsRight" class="groups-column"></div>
          </div>

        </div>
      </div>

      <!-- Input Section para Pronósticos -->
      <div class="predictions-input-section">
        <h2 class="input-title">📋 TUS PRONÓSTICOS</h2>
        <div class="predictions-grid" id="predictionsGrid"></div>
      </div>

      <!-- Submit -->
      <div class="submit-section">
        <button class="submit-btn" id="btnSubmit">📤 ENVIAR CÁTEDRA</button>
      </div>

    </div>
  </div>

  <!-- ==================== LEADERBOARD TAB ==================== -->
  <div id="tab-leaderboard" class="tab-content">
    <div class="container">
      <h2 class="section-title">🏅 RANKING MUNDIAL</h2>
      <p class="note-text">
        Ranking en vivo de todos los participantes
      </p>

      <div id="leaderboardContent">
        <p class="note-text" style="margin-top:20px;">Cargando...</p>
      </div>
    </div>
  </div>

  <!-- Loading Overlay -->
  <div class="loading-overlay" id="loadingOverlay" style="display:none;">
    <span class="ball-spinner">⚽</span>
    <p id="loadingText">Cargando...</p>
  </div>

  <!-- Toast container -->
  <div id="toastContainer"></div>

  <!-- Confetti container -->
  <div class="confetti-container" id="confettiContainer"></div>

  <script src="results.js"></script>
  <script src="app.js"></script>

  <!-- Modal para Nombre -->
  <div class="name-modal-overlay" id="nameModal" style="display:none;">
    <div class="name-modal">
      <h3>¿Quién eres?</h3>
      <p>Ingresa tu nombre para enviar tu pronóstico</p>

      <input
        type="text"
        id="playerNameInput"
        class="name-modal-input"
        placeholder="Tu nombre aquí"
        maxlength="40"
      >

      <div class="name-modal-actions">
        <button type="button" class="toolbar-btn" id="cancelNameSubmit">Cancelar</button>
        <button type="button" class="submit-btn" id="confirmNameSubmit">Enviar</button>
      </div>
    </div>
  </div>

</body>
</html>
