<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fase Final - Copa Mundial FIFA 2026</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flag-icons@7.2.3/css/flag-icons.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="tournament-container">
        <header class="main-header">
            <h1>
            <img src="imagenes/logo-mundial.png" alt="Logo Mundial FIFA 2026" style="height: 40px; vertical-align: middle;"> 
            FASE FINAL - MUNDIAL FIFA 2026 
        <img src="imagenes/logo-mundial.png" alt="Logo Mundial FIFA 2026" style="height: 40px; vertical-align: middle;">
        </h1>
            <h2 class="subtitle">FIFA WORLD CUP 2026</h2>
        </header>

        <nav class="tab-nav">
            <button class="tab-btn active" data-tab="bracket">⚽ FASE FINAL</button>
            <button class="tab-btn" data-tab="leaderboard">🏅 RANKING</button>
        </nav>

        <div class="toolbar-section">
            <button class="toolbar-btn" id="btnReset">🗑️ LIMPIAR</button>
            <button class="toolbar-btn" id="btnScoringHelp">❓ PUNTUACIÓN</button>
        </div>

        <section class="bracket-section" id="bracket-section">
            
            <!-- BLOQUE DIECISEISAVOS -->
            <div class="round-block">
                <div class="round-header">
                    <h3 class="round-title">🔴 DIECISEISAVOS</h3>
                    <button class="toggle-btn" data-phase="round32">👁️ Ver</button>
                </div>
                <div class="matches-container" id="round32-container" style="display: none;">
                    <div id="round32"></div>
                </div>
            </div>

            <!-- BLOQUE OCTAVOS -->
            <div class="round-block">
                <div class="round-header">
                    <h3 class="round-title">🟡 OCTAVOS</h3>
                    <button class="toggle-btn" data-phase="round16">👁️ Ver</button>
                </div>
                <div class="matches-container" id="round16-container" style="display: none;">
                    <div id="round16"></div>
                </div>
            </div>

            <!-- BLOQUE CUARTOS -->
            <div class="round-block">
                <div class="round-header">
                    <h3 class="round-title">🟢 CUARTOS</h3>
                    <button class="toggle-btn" data-phase="quarterfinals">👁️ Ver</button>
                </div>
                <div class="matches-container" id="quarterfinals-container" style="display: none;">
                    <div id="quarterfinals"></div>
                </div>
            </div>

            <!-- BLOQUE SEMIS -->
            <div class="round-block">
                <div class="round-header">
                    <h3 class="round-title">🔵 SEMIS</h3>
                    <button class="toggle-btn" data-phase="semifinals">👁️ Ver</button>
                </div>
                <div class="matches-container" id="semifinals-container" style="display: none;">
                    <div id="semifinals"></div>
                </div>
            </div>

            <!-- BLOQUE FINAL -->
            <div class="round-block">
                <div class="round-header">
                    <h3 class="round-title">⭐ FINAL</h3>
                    <button class="toggle-btn" data-phase="final">👁️ Ver</button>
                </div>
                <div class="matches-container" id="final-container" style="display: none;">
                    <div id="final"></div>
                </div>
            </div>
        </section>

        <div class="submit-section">
            <button class="submit-btn" id="btnSubmit">📤 ENVIAR PRONÓSTICO</button>
        </div>

        <section id="leaderboard-section" class="leaderboard-section" style="display:none;">
            <h2 class="section-title">🏅 RANKING</h2>
            <div id="leaderboardContent"><p class="note-text">Cargando...</p></div>
        </section>
    </main>

    <div class="loading-overlay" id="loadingOverlay" style="display:none;">
        <span class="ball-spinner">⚽</span>
        <p id="loadingText">Enviando...</p>
    </div>

    <div id="toastContainer"></div>
    <div class="confetti-container" id="confettiContainer"></div>

    <div class="name-modal-overlay" id="nameModal" style="display:none;">
        <div class="name-modal">
            <h3>¿Cuál es tu nombre?</h3>
            <input type="text" id="playerNameInput" class="name-modal-input" placeholder="Tu nombre" maxlength="40">
            <div class="name-modal-actions">
                <button class="toolbar-btn" id="cancelNameSubmit">Cancelar</button>
                <button class="submit-btn" id="confirmNameSubmit">Enviar</button>
            </div>
        </div>
    </div>

    <script src="results.js"></script>
    <script src="app.js"></script>
</body>
</html>
