<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mundial FIFA 2026 - Cuadro Final</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flag-icons@7.2.3/css/flag-icons.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>🏆 CUADRO FINAL - MUNDIAL 2026 🏆</h1>
  </header>

  <nav class="tab-nav">
    <button class="tab-btn active" data-tab="bracket">⚽ CUADRO FINAL</button>
    <button class="tab-btn" data-tab="leaderboard">🏅 RANKING</button>
  </nav>

  <div id="tab-bracket" class="tab-content active">
    <div class="container">
      <div class="toolbar-btns">
        <button class="toolbar-btn" id="btnReset">🗑️ LIMPIAR</button>
        <button class="toolbar-btn" id="btnScoringHelp">❓ PUNTUACIÓN</button>
      </div>

      <div class="bracket-main">
        <svg class="bracket-lines" id="bracketLines"></svg>
        
        <div class="bracket-layout">
          <!-- GRUPOS IZQUIERDA -->
          <div class="groups-section groups-left" id="groupsLeft"></div>

          <!-- BRACKET CENTRAL -->
          <div class="bracket-rounds">
            <div class="round-16avos" id="round16avos"></div>
            <div class="round-8avos" id="round8avos"></div>
            <div class="round-cuartos" id="roundCuartos"></div>
            <div class="round-semis" id="roundSemis"></div>
            
            <!-- TROFEO EN EL CENTRO -->
            <div class="trophy-center">
              <div class="trophy-icon">🏆</div>
              <div class="trophy-label">FINAL</div>
            </div>
            
            <div class="round-final" id="roundFinal"></div>
          </div>

          <!-- GRUPOS DERECHA -->
          <div class="groups-section groups-right" id="groupsRight"></div>
        </div>
      </div>

      <div class="submit-section">
        <button class="submit-btn" id="btnSubmit">📤 ENVIAR PRONÓSTICO</button>
      </div>
    </div>
  </div>

  <div id="tab-leaderboard" class="tab-content">
    <div class="container">
      <h2 class="section-title">🏅 RANKING</h2>
      <div id="leaderboardContent"><p class="note-text">Cargando...</p></div>
    </div>
  </div>

  <div class="loading-overlay" id="loadingOverlay" style="display:none;">
    <span class="ball-spinner">⚽</span>
    <p id="loadingText">Enviando...</p>
  </div>

  <div id="toastContainer"></div>
  <div class="confetti-container" id="confettiContainer"></div>

  <div class="name-modal-overlay" id="nameModal" style="display:none;">
    <div class="name-modal">
      <h3>¿Quién eres?</h3>
      <input type="text" id="playerNameInput" class="name-modal-input" placeholder="Tu nombre" maxlength="40">
      <div class="name-modal-actions">
        <button class="toolbar-btn" id="cancelNameSubmit">Cancelar</button>
        <button class="submit-btn" id="confirmNameSubmit">Enviar</button>
      </div>
    </div>
  </div>

  <script src="results.js"></script>
  <script src="app.js"></script>
</body>
</html>
