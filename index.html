<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mundial FIFA 2026 - Dieciseisavos</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flag-icons@7.2.3/css/flag-icons.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>🏆 MUNDIAL FIFA 2026 🏆</h1>
    <p class="subtitle">DIECISEISAVOS DE FINAL</p>
  </header>

  <nav class="tab-nav">
    <button class="tab-btn active" data-tab="bracket">⚽ BRACKET</button>
    <button class="tab-btn" data-tab="leaderboard">🏅 RANKING</button>
  </nav>

  <!-- BRACKET TAB -->
  <div id="tab-bracket" class="tab-content active">
    <div class="container">

      <div class="toolbar-btns">
        <button class="toolbar-btn" id="btnReset">🗑️ Limpiar</button>
        <button class="toolbar-btn" id="btnScoringHelp">❓ Puntuación</button>
      </div>

      <!-- BRACKET CONTAINER -->
      <div class="bracket-wrapper" id="bracketContainer"></div>

      <!-- SUBMIT -->
      <div class="submit-section">
        <button class="submit-btn" id="btnSubmit">📤 ENVIAR CÁTEDRA</button>
      </div>

    </div>
  </div>

  <!-- LEADERBOARD TAB -->
  <div id="tab-leaderboard" class="tab-content">
    <div class="container">
      <h2 class="section-title">🏅 RANKING</h2>
      <div id="leaderboardContent">
        <p class="note-text">Cargando...</p>
      </div>
    </div>
  </div>

  <!-- Loading -->
  <div class="loading-overlay" id="loadingOverlay" style="display:none;">
    <span class="ball-spinner">⚽</span>
    <p id="loadingText">Enviando...</p>
  </div>

  <!-- Toast -->
  <div id="toastContainer"></div>

  <!-- Confetti -->
  <div class="confetti-container" id="confettiContainer"></div>

  <!-- Modal -->
  <div class="name-modal-overlay" id="nameModal" style="display:none;">
    <div class="name-modal">
      <h3>¿Quién eres?</h3>
      <input type="text" id="playerNameInput" class="name-modal-input" 
             placeholder="Tu nombre" maxlength="40">
      <div class="name-modal-actions">
        <button class="toolbar-btn" id="cancelNameSubmit">Cancelar</button>
        <button class="submit-btn" id="confirmNameSubmit">Enviar</button>
      </div>
    </div>
  </div>

  <script src="results.js"></script>
  <script src="app.js"></script>

</body>
</html>
